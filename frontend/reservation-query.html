  <link rel="stylesheet" href="css/style.css" />
  <style>
    :root {
      --color-primary: #0D47A1;
      --color-primary-light: #E3F2FD;
      --color-text: #1A1A2E;
      --color-text-muted: #5C5C6D;
      --color-border: #E8E8ED;
      --color-bg: #FAFAFC;
      --radius-md: 12px;
      --radius-lg: 16px;
      --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans SC', sans-serif; background: var(--color-bg); color: var(--color-text); line-height: 1.6; }

    .campus-hero {
      background: url('https://www.tsinghua.edu.cn/__local/6/A2/E8/04FC4473DFD835A4B6C2679D55E_D619F5BE_1A1387.jpg') center/cover no-repeat;
      padding: 120px 0 60px;
      position: relative;
      overflow: hidden;
    }
    .campus-hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.45);
    }
    .campus-hero__content {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .campus-hero__title { font-size: clamp(2rem, 4vw, 3rem); font-weight: 700; color: #fff; margin-bottom: 12px; }
    .campus-hero__subtitle { font-size: 1.125rem; color: rgba(255,255,255,0.85); }

    .query-main {
      max-width: 800px;
      margin: 56px auto 80px;
      padding: 0 24px;
    }
    .query-card {
      background: #fff;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: 28px;
      margin-bottom: 24px;
    }
    .query-card__title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--color-primary);
      display: inline-block;
    }
    .query-form {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
    }
    .query-form .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .query-form label { font-size: 14px; font-weight: 500; color: var(--color-text); }
    .query-form label span { color: #f44336; }
    .query-form input,
    .query-form select {
      padding: 12px 16px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: 15px;
      min-width: 180px;
    }
    .query-form input:focus,
    .query-form select:focus {
      outline: none;
      border-color: var(--color-primary);
    }
    .query-form .submit-btn {
      padding: 12px 24px;
      background: linear-gradient(135deg, #0D47A1 0%, #1565C0 100%);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
    }
    .query-form .submit-btn:hover { opacity: 0.95; }
    .query-form .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .query-result { margin-top: 8px; }
    .query-result--empty,
    .query-result--error {
      color: var(--color-text-muted);
      padding: 24px;
      text-align: center;
    }
    .query-result--error { color: #c62828; }
    .query-result-list { list-style: none; }
    .query-result-item {
      background: var(--color-bg);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 16px;
      border-left: 4px solid var(--color-primary);
    }
    .query-result-item:last-child { margin-bottom: 0; }
    .query-result-item__row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 24px;
      margin-bottom: 8px;
    }
    .query-result-item__row:last-child { margin-bottom: 0; }
    .query-result-item__label { color: var(--color-text-muted); font-size: 14px; }
    .query-result-item__value { font-weight: 500; }
    .query-result-item__meta { font-size: 13px; color: var(--color-text-muted); margin-top: 12px; }
  </style>
</head>
<body>
  <!-- Header -->
  <script>
    document.write(`<header class="header" id="header" role="banner">

        <img src="logo.png" alt="" class="header__logo-badge header__logo-badge--scrolled" width="48" height="48" aria-hidden="true" />
        <span class="header__logo-text-wrap">
          <span class="header__logo-title">易普工业大学</span>
          <span class="header__logo-en">Industrial University</span>
        </span>
      </a>
      <nav class="header__nav" aria-label="主导航">
        <ul class="header__nav-list">
          <li><a href="index.html" class="header__nav-home">首页</a></li>
          <li><a href="index.html#about">学校概况</a></li>
          <li><a href="index.html#colleges">院系设置</a></li>
          <li><a href="index.html#news">教育教学</a></li>
          <li><a href="index.html#stats">科学研究</a></li>
          <li><a href="index.html#cta">招生就业</a></li>
          <li><a href="opencampus.html">校园开放日</a></li>
          <li><a href="reservation-query.html" class="is-active">预约查询</a></li>
        </ul>
      </nav>
      <div class="header__actions">
        <a href="login.html" class="header__login-btn" id="loginBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg><span>登录</span></a>
        <button type="button" class="header__menu-btn" aria-label="打开菜单" id="menuBtn"><span></span><span></span><span></span></button>
      </div>
    </div>
    <div class="header__mobile-nav" id="mobileNav" aria-hidden="true">
      <ul class="header__mobile-list">
        <li><a href="index.html">首页</a></li>

      </ul>
    </div>
  </header>`);
  </script>

  <section class="campus-hero">
    <nav class="breadcrumb breadcrumb--on-hero" aria-label="面包屑导航">
      <div class="container">
        <ol class="breadcrumb__list">
          <li class="breadcrumb__item"><a href="index.html">首页</a></li>
          <li class="breadcrumb__item"><a href="opencampus.html">校园开放日</a></li>
          <li class="breadcrumb__item" aria-current="page">预约查询</li>
        </ol>
      </div>
    </nav>
    <div class="campus-hero__content">
      <h1 class="campus-hero__title">预约查询</h1>
      <p class="campus-hero__subtitle">输入预约时留的手机号，查询您的开放日预约记录</p>
    </div>
  </section>

  <main class="query-main">
    <div class="query-card">
      <h2 class="query-card__title">我的预约</h2>
      <form class="query-form" id="queryForm">
        <div class="form-group">
          <label>联系电话 <span>*</span></label>
          <input type="tel" name="phone" id="queryPhone" placeholder="请输入预约时填写的手机号" required />
        </div>
        <div class="form-group">
          <label>预约日期</label>
          <select name="date" id="queryDate">
            <option value="">全部日期</option>
            <option value="2025-03-29">2025年3月29日</option>
            <option value="2025-04-26">2025年4月26日</option>
            <option value="2025-05-31">2025年5月31日</option>
            <option value="2025-06-28">2025年6月28日</option>
          </select>
        </div>
        <div class="form-group">
          <button type="submit" class="submit-btn" id="queryBtn">查询</button>
        </div>
      </form>
      <div class="query-result" id="queryResult" aria-live="polite">
        <p class="query-result--empty" id="queryResultPlaceholder">请输入预约时使用的手机号并点击「查询」，即可查看您的预约记录。</p>
      </div>
    </div>
  </main>

  <footer class="footer" role="contentinfo">
    <div class="container">
      <div class="footer__grid">
        <div class="footer__brand">
          <a href="index.html" class="footer__logo">

          </a>
          <p class="footer__tagline">工业报国 · 追求卓越</p>
        </div>
        <div class="footer__links">
          <h4 class="footer__heading">快速链接</h4>
          <ul class="footer__list">
            <li><a href="opencampus.html">校园开放日</a></li>
            <li><a href="reservation-query.html">预约查询</a></li>
            <li><a href="index.html">首页</a></li>
          </ul>
        </div>
      </div>
      <div class="footer__bottom">
        <p>&copy; 2025 易普工业大学 版权所有</p>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/config.js"></script>
  <script>
    (function () {
      var form = document.getElementById('queryForm');
      var resultEl = document.getElementById('queryResult');
      var placeholderEl = document.getElementById('queryResultPlaceholder');
      var queryBtn = document.getElementById('queryBtn');
      var apiBase = window.API_BASE || 'http://localhost:3000';

      function escapeHtml(s) {
        if (s == null || s === undefined) return '';
        var d = document.createElement('div');
        d.textContent = String(s);
        return d.innerHTML;
      }

      function formatDate(str) {
        if (!str) return '';
        var d = String(str).slice(0, 10);
        if (d.length === 10) return d.replace(/-/g, '年', 1).replace(/-/g, '月', 1) + '日';
        return d;
      }

      function renderList(data) {
        if (!Array.isArray(data) || data.length === 0) {
          resultEl.innerHTML = '<p class="query-result--empty">未查到预约记录。请确认手机号是否正确，或是否已提交过预约。</p>';
          return;
        }
        var html = '<ul class="query-result-list">';
        data.forEach(function (r) {
          var date = escapeHtml(r.reservation_date || '');
          var student = escapeHtml(r.student_name || '');
          var parent = escapeHtml(r.parent_name || '—');
          var phone = escapeHtml(r.contact_phone || '');
          var people = escapeHtml(r.num_people != null ? r.num_people + ' 人' : '');
          var school = escapeHtml(r.current_school || '—');
          var grade = escapeHtml(r.grade || '—');
          var major = escapeHtml(r.desired_college_major || '—');
          var created = r.created_at ? escapeHtml(String(r.created_at).slice(0, 16).replace('T', ' ')) : '';
          html += '<li class="query-result-item">';
          html += '<div class="query-result-item__row"><span class="query-result-item__label">预约日期：</span><span class="query-result-item__value">' + date + '</span></div>';
          html += '<div class="query-result-item__row"><span class="query-result-item__label">学生姓名：</span><span class="query-result-item__value">' + student + '</span></div>';
          html += '<div class="query-result-item__row"><span class="query-result-item__label">家长姓名：</span><span class="query-result-item__value">' + parent + '</span></div>';
          html += '<div class="query-result-item__row"><span class="query-result-item__label">联系电话：</span><span class="query-result-item__value">' + phone + '</span></div>';
          html += '<div class="query-result-item__row"><span class="query-result-item__label">预约人数：</span><span class="query-result-item__value">' + people + '</span></div>';
          html += '<div class="query-result-item__row"><span class="query-result-item__label">所在学校：</span><span class="query-result-item__value">' + school + '</span></div>';
          html += '<div class="query-result-item__row"><span class="query-result-item__label">年级：</span><span class="query-result-item__value">' + grade + '</span></div>';
          html += '<div class="query-result-item__row"><span class="query-result-item__label">意向学院/专业：</span><span class="query-result-item__value">' + major + '</span></div>';
          if (created) html += '<div class="query-result-item__meta">提交时间：' + created + '</div>';
          html += '</li>';
        });
        html += '</ul>';
        resultEl.innerHTML = html;
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var phone = (document.getElementById('queryPhone').value || '').trim().replace(/\s/g, '');
        var date = (document.getElementById('queryDate').value || '').trim();
        if (!phone) {
          resultEl.innerHTML = '<p class="query-result--error">请输入联系电话。</p>';
          return;
        }
        queryBtn.disabled = true;
        resultEl.innerHTML = '<p class="query-result--empty">查询中…</p>';
        var url = apiBase + '/api/reservations?contact_phone=' + encodeURIComponent(phone) + '&limit=20';
        if (date) url += '&date=' + encodeURIComponent(date);
        fetch(url)
          .then(function (r) { return r.json(); })
          .then(function (res) {
            if (res && res.success && Array.isArray(res.data)) {
              renderList(res.data);
            } else {
              resultEl.innerHTML = '<p class="query-result--error">' + (res && res.message ? escapeHtml(res.message) : '查询失败，请稍后重试。') + '</p>';
            }
          })
          .catch(function () {
            resultEl.innerHTML = '<p class="query-result--error">网络错误，请确认后端服务已启动（' + escapeHtml(apiBase) + '）。</p>';
          })
          .finally(function () { queryBtn.disabled = false; });
      });
    })();
  </script>
</body>
</html>
